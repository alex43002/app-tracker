name: Coverage

# Self-contained code-coverage gate that works on a free/personal repo (no
# GitHub Code Quality org plan or external service needed). Each job: runs its
# suite with coverage, FAILS when coverage drops below a threshold, writes a
# summary to the Actions run, and uploads the HTML/XML report as an artifact.
#
# This is not (yet) a required status check in the branch ruleset, so a red
# coverage run is visible on the PR but doesn't block merge. Promote it by
# adding `coverage / Backend coverage (pytest)` and
# `coverage / Desktop coverage (vitest)` to the ruleset's required checks once
# the thresholds have settled.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend coverage (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-app-tracker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The suite is mongomock-backed (tests/conftest.py) — no DB service or
      # secrets required. `python -m pytest` (not bare `pytest`) so the backend
      # dir is on sys.path and `app` imports. --cov-fail-under makes the job go
      # red if coverage regresses below the floor.
      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=80

      - name: Write coverage summary
        if: always()
        run: |
          {
            echo "### Backend coverage (pytest)"
            echo ""
            echo "**Total: $(python -m coverage report --format=total)%** (floor: 80%)"
            echo ""
            echo "<details><summary>Per-file report</summary>"
            echo ""
            echo '```'
            python -m coverage report
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend-app-tracker/coverage.xml
            backend-app-tracker/htmlcov/
          if-no-files-found: warn

  desktop:
    name: Desktop coverage (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: careerlog-desktop
    env:
      # CI only runs tests — no need for the Electron binary.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: careerlog-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Thresholds live in vitest.config.ts (coverage.thresholds); vitest exits
      # non-zero when the suite drops below them, failing the job.
      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Write coverage summary
        if: always()
        run: |
          echo "### Desktop coverage (vitest)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/coverage-summary.json ]; then
            node -e "const t=require('./coverage/coverage-summary.json').total; const p=k=>t[k].pct; process.stdout.write('| Metric | % |\n| --- | --- |\n| Lines | '+p('lines')+' |\n| Statements | '+p('statements')+' |\n| Functions | '+p('functions')+' |\n| Branches | '+p('branches')+' |\n');" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No coverage summary was produced._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-coverage
          path: careerlog-desktop/coverage/
          if-no-files-found: warn
