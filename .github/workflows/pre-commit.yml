name: Pre-commit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: careerlog-desktop/package-lock.json

      # The desktop tsc/eslint hooks run against the project's own node_modules.
      - name: Install desktop dependencies
        working-directory: careerlog-desktop
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci --ignore-scripts

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
