name: Code Coverage

# Uploads Cobertura coverage to GitHub Code Quality so the repository ruleset's
# `code_coverage` rule can gate PRs. Requires GitHub Code Quality to be enabled
# in repo Settings (Settings → Security → Code quality) — until then the upload
# step will fail. Both push (default-branch baseline) and pull_request (the PR to
# compare) triggers are needed; Code Quality aggregates the two uploads below.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  code-quality: write

jobs:
  backend:
    name: Backend coverage (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-app-tracker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The suite is mongomock-backed (see tests/conftest.py) — no DB service or
      # secrets required. `python -m pytest` (not bare `pytest`) so the backend
      # dir is on sys.path and `app` imports.
      - name: Run tests with coverage
        run: python -m pytest --cov=app --cov-report=xml

      - name: Upload coverage to GitHub Code Quality
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: backend-app-tracker/coverage.xml
          language: Python
          label: code-coverage/pytest

  desktop:
    name: Desktop coverage (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: careerlog-desktop
    env:
      # CI only runs tests — no need for the Electron binary.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: careerlog-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to GitHub Code Quality
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: careerlog-desktop/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/vitest
