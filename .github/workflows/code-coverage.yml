name: Code Coverage

# Runs the backend + desktop suites with coverage and uploads Cobertura to
# GitHub Code Quality. Code Quality is only available to orgs on Team/Enterprise
# plans — not personal repos — so on this repo the upload 404s and these jobs
# fail (fail-on-error: true, so the failure is surfaced rather than hidden). That
# is non-blocking: `code_coverage` is NOT a required ruleset rule here, so red
# coverage jobs don't stop merges. The suites + Cobertura still run every PR, so
# it's ready to gate if the repo ever moves into an org.
# See .github/CODE_QUALITY_SETUP.md.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  code-quality: write

jobs:
  backend:
    name: Backend coverage (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-app-tracker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The suite is mongomock-backed (see tests/conftest.py) — no DB service or
      # secrets required. `python -m pytest` (not bare `pytest`) so the backend
      # dir is on sys.path and `app` imports.
      - name: Run tests with coverage
        run: python -m pytest --cov=app --cov-report=xml

      - name: Upload coverage to GitHub Code Quality
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: backend-app-tracker/coverage.xml
          language: Python
          label: code-coverage/pytest
          fail-on-error: true

  desktop:
    name: Desktop coverage (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: careerlog-desktop
    env:
      # CI only runs tests — no need for the Electron binary.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: careerlog-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to GitHub Code Quality
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: careerlog-desktop/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/vitest
          fail-on-error: true
